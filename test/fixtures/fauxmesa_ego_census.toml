date = "2026-07-13"
dataset = "ergm::faux.mesa.high: 205 students, 203 undirected friendship ties, Grade 7-12"
sampling_design = "CENSUS: as.egor(faux.mesa.high) -- every actor is an ego, unit sampling weights, ppopsize = popsize = 205. A stated, known design, chosen so the target statistics and their design variance are both DETERMINISTIC and can be asserted exactly (issue ERGMEgo#1)."
model = "egor ~ edges + nodematch(\"Grade\"), fitted by ergm.ego with an offset netsize.adj term"
replication_seeds = "101,202,303,404,505"

[tolerance]
# TARGET STATISTICS. Under a census these are the observed network's own
# statistics (edges = 203, nodematch.Grade = 163): a deterministic function
# of the data, with no sampling and no Monte Carlo. Machine precision. A
# failure here means the design-weighted per-capita scaling is wrong.
targets = 1e-9
#
# DESIGN STANDARD ERRORS OF THE TARGETS -- THE POINT OF THIS FIXTURE, AND
# THE DIRECT TEST OF ISSUE ERGMEgo#1.
#
# This is `sqrt(diag(Sigma_design))`, the survey variance of the target
# statistics: a function of the 205 per-ego contributions and their weights
# and NOTHING else -- no estimator, no MCMC, no I^-1 sandwich to blame a
# disagreement on. Whatever ERGMEgo.jl's `_design_cov` returns can be
# compared to it directly.
#
# MEASURED RESULT (issue ERGMEgo#1, ANSWERED):
#
#   ERGMEgo.jl's design variance is TOO SMALL BY EXACTLY THE FACTOR (n-1)/n.
#
# Not approximately. Exactly. `_design_cov` computes
#   Sigma = m^2 * sum_i w_i^2 (h_i - hbar)(h_i - hbar)',   w_i = 1/n,
# which is m^2 * S / n^2 with S = sum of squared deviations. The survey
# (SRS / Horvitz-Thompson) variance of a mean that ergm.ego computes is
#   m^2 * s^2 / n = m^2 * S / ((n-1) * n),
# with the UNBIASED s^2. The ratio is (n-1)/n: ERGMEgo.jl divides the sum of
# squares by n where the unbiased estimator divides by n-1. Every entry of
# the covariance matrix is off by that one factor, and the Julia testset
# asserts the relationship to 1e-9 rather than merely noting a gap -- so if
# the estimator is fixed, or if the discrepancy ever changes CHARACTER, the
# test says so immediately.
#
# At n = 205 this is a 0.24% understatement of the standard error: real, but
# not what makes issue #1 serious. What makes it serious is the OTHER half,
# which this fixture also measures: the design component is ~17x the
# estimation component here, so an ergm.ego standard error IS its design
# variance, and that variance is computed under an assumption (independent
# egos, no strata/clusters/FPC/without-replacement) that a census does not
# violate -- but a real survey would. The (n-1)/n factor is the part that a
# test can catch. The design assumptions are the part that only a richer
# design can catch, and ERGMEgo.jl cannot express one.
#
# 0.05 is the absolute atol on the SEs (15.2, 13.6), i.e. ~0.3% -- it admits
# the measured (n-1)/n gap of 0.037 and nothing larger. It is NOT a blessing
# of the gap; the exact-factor assertion in the testset is the real check.
design_std_errors = 0.05
#
# FITTED COEFFICIENTS -- AND A PARAMETERIZATION DIFFERENCE THAT MUST BE
# MAPPED, NOT ASSUMED AWAY.
#
# ergm.ego splits the population edges parameter into a FIXED OFFSET
# `netsize.adj` = -log(popsize) = -5.3230 plus a free `edges` coefficient
# (-0.6974). ERGMEgo.jl reports a single edges coefficient on the
# pseudo-population scale, with its own adjustment -log(N/m), which under
# this census (N = m = 205) is 0. The two numbers are therefore NOT
# comparable term-by-term: R's -0.6974 and Julia's -6.07 are the same
# parameter in different parameterizations. The quantity both packages
# estimate is netsize.adj + edges = -6.0204, frozen below as
# `mle_coefficients_population`, and it is what the Julia testset compares
# against. (Cross-check: a plain ERGM.jl MPLE of edges + nodematch on the
# same 205-node network gives -6.034 / 2.831 -- which is what a census
# SHOULD reduce to, and it does.)
#
# Both sides are moment-matching by MCMC. Measured spreads:
#   ergm.ego seed-to-seed sd : 0.0100 (edges), 0.0098 (nodematch)
#   ERGMEgo.jl seed-to-seed sd: 0.040, 0.044 -- 4x noisier
#   |mean(ERGMEgo.jl, 5 seeds) - R| : 0.052, 0.047
# The gap is ~2.5x the combined Monte-Carlo error of the two means, so there
# IS a small systematic difference between the two estimators (most likely
# the pseudo-population construction). It is 0.29 of R's fitted standard
# error on edges and 0.24 on nodematch -- too small to move a conclusion, and
# recorded here rather than tuned away.
#
# 0.12 clears the observed 0.052 by 2.3x, is 6x the Julia mean's own
# Monte-Carlo error, and is 0.67 of the smaller fitted standard error. Both
# sides are seeded, so the comparison is deterministic and cannot flake.
mle_coefficients_population = 0.12

